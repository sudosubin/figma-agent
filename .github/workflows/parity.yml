name: Parity

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FIGMA_VERSION: "126.3.12"
  # Upstream Figma agent 126.3.12 binds 44950 (HTTP) and 44960 (HTTPS).
  ORIG_HTTP_PORT: "44950"
  ORIG_TLS_PORT: "44960"
  OUR_HTTP_PORT: "45000"
  OUR_TLS_PORT: "45001"
  # Upstream rejects requests without this Origin header.
  ORIGIN_HEADER: "Origin: https://www.figma.com"

jobs:
  parity:
    name: parity (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch_slug: mac-arm
          - runner: macos-13
            arch_slug: mac
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install test fonts
        run: |
          brew install --cask \
            font-inter \
            font-recursive \
            font-fira-code \
            font-source-han-sans-vf

      - name: Cache Figma DMG
        id: dmg-cache
        uses: actions/cache@v4
        with:
          path: /tmp/Figma.dmg
          key: figma-${{ matrix.arch_slug }}-${{ env.FIGMA_VERSION }}

      - name: Download Figma DMG
        if: steps.dmg-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /tmp/Figma.dmg \
            "https://desktop.figma.com/${{ matrix.arch_slug }}/Figma-${{ env.FIGMA_VERSION }}.dmg"

      - name: Install upstream agent to canonical location
        # When launched from inside Figma.app the binary self-installs to
        # ~/Library/Application Support/Figma/FigmaAgent.app and hands off to
        # launchd. In CI there is no launchd registration, so we pre-place
        # the bundle at the canonical install path; the binary then skips
        # install and runs as a daemon directly.
        run: |
          hdiutil attach /tmp/Figma.dmg -nobrowse -readonly -mountpoint /Volumes/Figma
          DEST_DIR="$HOME/Library/Application Support/Figma"
          mkdir -p "$DEST_DIR"
          cp -R /Volumes/Figma/Figma.app/Contents/Library/FigmaAgent.app "$DEST_DIR/"
          hdiutil detach /Volumes/Figma
          xattr -dr com.apple.quarantine "$DEST_DIR/FigmaAgent.app" || true
          AGENT="$DEST_DIR/FigmaAgent.app/Contents/MacOS/figma_agent"
          ls -lh "$AGENT"
          echo "ORIG_AGENT=$AGENT" >> $GITHUB_ENV

      - name: Build our agent
        run: cargo build --release

      - name: Configure our agent ports
        run: |
          mkdir -p "$HOME/.config/figma-agent"
          cat > "$HOME/.config/figma-agent/config.json" <<EOF
          {
            "host": "127.0.0.1",
            "port": ${{ env.OUR_HTTP_PORT }},
            "tls_port": ${{ env.OUR_TLS_PORT }}
          }
          EOF
          cat "$HOME/.config/figma-agent/config.json"

      - name: Start upstream agent and warm
        # The first /font-files call drives enumeration of every system
        # font; on CI this can take well over a minute. Wait for the port
        # to open quickly, then send one blocking warm-up request so later
        # comparison steps hit the cache.
        run: |
          "$ORIG_AGENT" > /tmp/orig.log 2>&1 &
          echo $! > /tmp/orig.pid
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 ${{ env.ORIG_HTTP_PORT }} 2>/dev/null; then
              echo "upstream port open after ${i}s"
              break
            fi
            sleep 1
          done
          nc -z 127.0.0.1 ${{ env.ORIG_HTTP_PORT }} || {
            echo "::error::upstream did not bind ${{ env.ORIG_HTTP_PORT }}"
            cat /tmp/orig.log
            exit 1
          }
          # Probe a few candidate URLs with diagnostics so the next iteration
          # can pin down the right path / scheme.
          for ATTEMPT in http_files https_files http_root http_preview; do
            case "$ATTEMPT" in
              http_files)    URL="http://127.0.0.1:${{ env.ORIG_HTTP_PORT }}/font-files"; FLAGS="" ;;
              https_files)   URL="https://127.0.0.1:${{ env.ORIG_TLS_PORT }}/font-files"; FLAGS="-k" ;;
              http_root)     URL="http://127.0.0.1:${{ env.ORIG_HTTP_PORT }}/"; FLAGS="" ;;
              http_preview)  URL="http://127.0.0.1:${{ env.ORIG_HTTP_PORT }}/figma/font-files"; FLAGS="" ;;
            esac
            echo "--- probe $ATTEMPT: $URL ---"
            curl -s $FLAGS -D /tmp/h -o /tmp/b -w 'HTTP %{http_code}  size=%{size_download}\n' --max-time 30 \
              -H "${{ env.ORIGIN_HEADER }}" \
              "$URL" || true
            echo "response headers:"
            head -20 /tmp/h
            echo "body (first 300 bytes):"
            head -c 300 /tmp/b
            echo
          done
          echo "warming upstream..."
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /tmp/orig-resp -w '%{http_code}' --max-time 60 \
              -H "${{ env.ORIGIN_HEADER }}" \
              "http://127.0.0.1:${{ env.ORIG_HTTP_PORT }}/font-files" 2>/dev/null || echo 000)
            echo "  attempt $i: HTTP $CODE"
            if [ "${CODE:0:1}" = "2" ]; then
              echo "upstream warmed"
              break
            fi
            sleep 5
          done
          if [ "${CODE:0:1}" != "2" ]; then
            echo "::error::upstream never returned 2xx"
            cat /tmp/orig.log
            exit 1
          fi

      - name: Start our agent and warm
        run: |
          ./target/release/figma-agent > /tmp/ours.log 2>&1 &
          echo $! > /tmp/ours.pid
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 ${{ env.OUR_HTTP_PORT }} 2>/dev/null; then
              echo "ours port open after ${i}s"
              break
            fi
            sleep 1
          done
          nc -z 127.0.0.1 ${{ env.OUR_HTTP_PORT }} || {
            echo "::error::ours did not bind ${{ env.OUR_HTTP_PORT }}"
            cat /tmp/ours.log
            exit 1
          }
          curl -fs --max-time 240 --retry 30 --retry-all-errors --retry-delay 2 \
            -H "${{ env.ORIGIN_HEADER }}" \
            "http://127.0.0.1:${{ env.OUR_HTTP_PORT }}/font-files" > /dev/null
          echo "ours warmed"

      - name: Compare /font-files (HTTP)
        run: |
          ORIG="http://127.0.0.1:${{ env.ORIG_HTTP_PORT }}"
          OURS="http://127.0.0.1:${{ env.OUR_HTTP_PORT }}"
          # Mask volatile top-level fields. Strip our extra `path` per font.
          # Sort fonts by (postscript, family, style) for deterministic order.
          NORM='{
            modified_fonts: .modified_fonts,
            fonts: (.fonts | sort_by(.postscript, .family, .style))
          }'
          NORM_OURS='{
            modified_fonts: .modified_fonts,
            fonts: (.fonts | map(del(.path)) | sort_by(.postscript, .family, .style))
          }'
          curl -fs -H "${{ env.ORIGIN_HEADER }}" "$ORIG/font-files" | jq "$NORM"      > /tmp/orig-files.json
          curl -fs -H "${{ env.ORIGIN_HEADER }}" "$OURS/font-files" | jq "$NORM_OURS" > /tmp/ours-files.json
          diff -u /tmp/orig-files.json /tmp/ours-files.json

      - name: Compare /font-files (HTTPS)
        run: |
          ORIG="https://127.0.0.1:${{ env.ORIG_TLS_PORT }}"
          OURS="https://127.0.0.1:${{ env.OUR_TLS_PORT }}"
          NORM='{
            modified_fonts: .modified_fonts,
            fonts: (.fonts | sort_by(.postscript, .family, .style))
          }'
          NORM_OURS='{
            modified_fonts: .modified_fonts,
            fonts: (.fonts | map(del(.path)) | sort_by(.postscript, .family, .style))
          }'
          curl -fsk -H "${{ env.ORIGIN_HEADER }}" "$ORIG/font-files" | jq "$NORM"      > /tmp/orig-tls.json
          curl -fsk -H "${{ env.ORIGIN_HEADER }}" "$OURS/font-files" | jq "$NORM_OURS" > /tmp/ours-tls.json
          diff -u /tmp/orig-tls.json /tmp/ours-tls.json

      - name: Compare sampled /font-file binaries
        run: |
          ORIG="http://127.0.0.1:${{ env.ORIG_HTTP_PORT }}"
          OURS="http://127.0.0.1:${{ env.OUR_HTTP_PORT }}"
          # Sample 8 fonts under the upstream 32 MB ceiling.
          # Path comes from our response since upstream omits the field.
          mapfile -t SAMPLES < <(curl -fs -H "${{ env.ORIGIN_HEADER }}" "$OURS/font-files" \
            | jq -r '.fonts | sort_by(.postscript) | .[].path' \
            | awk '!seen[$0]++' \
            | while read -r p; do
                [ -f "$p" ] && [ "$(stat -f%z "$p")" -le 33554432 ] && echo "$p"
              done \
            | head -8)
          if [ "${#SAMPLES[@]}" -eq 0 ]; then
            echo "::error::no sampleable fonts found"
            exit 1
          fi
          for p in "${SAMPLES[@]}"; do
            ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$p")
            SHA_ORIG=$(curl -fs -H "${{ env.ORIGIN_HEADER }}" "$ORIG/font-file?file=$ENC" | shasum -a 256 | awk '{print $1}')
            SHA_OURS=$(curl -fs -H "${{ env.ORIGIN_HEADER }}" "$OURS/font-file?file=$ENC" | shasum -a 256 | awk '{print $1}')
            if [ "$SHA_ORIG" != "$SHA_OURS" ]; then
              echo "::error::binary diff: $p"
              echo "  upstream: $SHA_ORIG"
              echo "  ours:     $SHA_OURS"
              exit 1
            fi
            echo "ok $SHA_ORIG  $p"
          done

      - name: Teardown
        if: always()
        run: |
          [ -f /tmp/orig.pid ] && kill "$(cat /tmp/orig.pid)" 2>/dev/null || true
          [ -f /tmp/ours.pid ] && kill "$(cat /tmp/ours.pid)" 2>/dev/null || true
          echo "=== upstream log (tail) ==="
          tail -40 /tmp/orig.log 2>/dev/null || true
          echo "=== ours log (tail) ==="
          tail -40 /tmp/ours.log 2>/dev/null || true
